services:

  smarttraffic-db:
    image: postgres:15-alpine
    container_name: smarttraffic-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarttrafficflow
    ports:
      - "5432:5432"
    networks:
      - backend-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  smarttraffic-backend:
    build:
      context: ../backend
    container_name: smarttraffic-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://smarttraffic-db:5432/smarttrafficflow
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8080
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5174
    ports:
      - "8080:8080"
    networks:
      - backend-network
    depends_on:
      smarttraffic-db:
        condition: service_healthy

  smarttraffic-frontend:
    image: node:20-alpine
    container_name: smarttraffic-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    networks:
      - backend-network
    volumes:
      - ../frontend/latest-app:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8100:80"
    networks:
      - backend-network
    depends_on:
      - smarttraffic-db

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules: