services:
  smarttraffic-db:
    image: postgis/postgis:15-3.4
    container_name: smarttraffic-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarttrafficflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarttrafficflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  smarttraffic-backend:
    build:
      context: ../backend
    container_name: smarttraffic-backend
    restart: unless-stopped
    env_file:
      - ${SMARTTRAFFIC_BACKEND_ENV_FILE:-/opt/smarttrafficflow/env/backend.env}
    ports:
      - "8080:8080"
    networks:
      - backend-network
    depends_on:
      - smarttraffic-db
    volumes:
      - ${SMARTTRAFFIC_DATA_DIR:-/opt/smarttrafficflow/data}:/runtime-data:ro

  smarttraffic-frontend:
    image: node:20-alpine
    container_name: smarttraffic-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - ${SMARTTRAFFIC_FRONTEND_ENV_FILE:-/opt/smarttrafficflow/env/frontend.env}
    ports:
      - "5174:5174"
    networks:
      - backend-network
    depends_on:
      - smarttraffic-backend
    volumes:
      - ../frontend/latest-app:/app
      - frontend_node_modules:/app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    restart: unless-stopped
    profiles:
      - admin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "8100:80"
    networks:
      - backend-network
    depends_on:
      - smarttraffic-db

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
