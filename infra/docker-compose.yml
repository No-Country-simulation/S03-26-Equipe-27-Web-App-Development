services:
  smarttraffic-db:
    image: postgis/postgis:15-3.4
    container_name: smarttraffic-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smarttrafficflow
    ports:
      - "5432:5432"
    networks:
      - backend-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  smarttraffic-frontend:
    image: node:20-alpine
    container_name: smarttraffic-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5174:5174"
    networks:
      - backend-network
    volumes:
      - ../frontend/latest-app:/app
      - frontend_node_modules:/app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "8100:80"
    networks:
      - backend-network
    depends_on:
      - smarttraffic-db

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  frontend_node_modules:
